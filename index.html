<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Sabae Bypass Route</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.css" />
    <style>
        #map { height: 100vh; width: 100%; }
        body { margin: 0; padding: 0; }
        /* モード切り替えボタンのスタイル */
        #controls {
            position: absolute;
            top: 10px;
            left: 50px;
            z-index: 1000;
            background: white;
            padding: 10px;
            border-radius: 5px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }
        .btn {
            padding: 5px 10px;
            margin-right: 5px;
            cursor: pointer;
        }
        .active {
            background-color: #007bff;
            color: white;
            border: 1px solid #007bff;
        }
    </style>
</head>
<body>

    <div id="controls">
        <button class="btn active" onclick="changeMode('car', this)">🚗 車</button>
        <button class="btn" onclick="changeMode('walk', this)">🚶 徒歩</button>
        <button class="btn" onclick="changeMode('bike', this)">🚲 自転車</button>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.js"></script>

    <script>
        const map = L.map('map').setView([35.9430, 136.1888], 15);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);

        // 提示された事故現場のすべての座標（赤点で強調）
        const accidentPoints = [
            [35.943611, 136.188500], [35.943444, 136.188417], [35.942972, 136.188472],
            [35.943389, 136.188056], [35.943556, 136.185917], [35.943722, 136.185028],
            [35.943861, 136.182639], [35.944472, 136.180250], [35.943917, 136.180250],
            [35.943806, 136.179778], [35.943833, 136.178639], [35.945361, 136.179694],
            [35.945583, 136.179833], [35.945889, 136.180028], [35.946667, 136.180500],
            [35.947583, 136.181111]
        ];

        // 各座標に目立つ赤点を配置
        accidentPoints.forEach(coord => {
            L.circleMarker(coord, {
                radius: 8,
                fillColor: "#ff0000",
                color: "#ffffff",
                weight: 2,
                opacity: 1,
                fillOpacity: 0.9
            }).addTo(map);
        });

        // 各モードごとの迂回経由地設定
        const routes = {
            car: [
                L.latLng(35.9430, 136.1888), // 鯖江駅
                L.latLng(35.9388, 136.1855), // 南側迂回（鯖江高校前）
                L.latLng(35.9392, 136.1742), // 有定町
                L.latLng(35.9519, 136.1856)  // 西山公園駅
            ],
            walk: [
                L.latLng(35.9430, 136.1888), // 鯖江駅
                L.latLng(35.9446, 136.1880), // 駅北側裏道
                L.latLng(35.9443, 136.1815), // 本町住宅街
                L.latLng(35.9519, 136.1856)  // 西山公園駅
            ],
            bike: [
                L.latLng(35.9430, 136.1888), // 鯖江駅
                L.latLng(35.9412, 136.1845), // 線路南側高架下
                L.latLng(35.9425, 136.1795), // 嚮陽会館南側
                L.latLng(35.9519, 136.1856)  // 西山公園駅
            ]
        };

        let routingControl = L.Routing.control({
            waypoints: routes.car,
            routeWhileDragging: false,
            draggableWaypoints: false,
            addWaypoints: false,
            lineOptions: { styles: [{ color: '#007bff', opacity: 0.7, weight: 6 }] }
        }).addTo(map);

        function changeMode(mode, btn) {
            // ボタンのスタイル切り替え
            document.querySelectorAll('.btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');

            // ルートの更新
            routingControl.setWaypoints(routes[mode]);
        }
    </script>
</body>
</html>
