<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Sabae Bypass Route</title>
    <style>
        #map { height: 100vh; width: 100%; }
        body { margin: 0; }
    </style>
    <script src="https://maps.googleapis.com/maps/api/js?key=YOUR_API_KEY&callback=initMap" async defer></script>
</head>
<body>
    <div id="map"></div>
    <script>
        function initMap() {
            // 鯖江駅を中心にマップを初期化
            const map = new google.maps.Map(document.getElementById('map'), {
                zoom: 15,
                center: { lat: 35.9430, lng: 136.1888 }
            });

            const directionsService = new google.maps.DirectionsService();
            const directionsRenderer = new google.maps.DirectionsRenderer({ map: map });

            // 事故現場（嚮陽通り〜つつじ通り）を完全に北側から大きく迂回する経由地
            const waypoints = [
                { location: new google.maps.LatLng(35.9472, 136.1920), stopover: false }, // 鯖江駅から北上した交差点
                { location: new google.maps.LatLng(35.9535, 136.1885), stopover: false }  // 西山公園駅より北側の安全な大通り
            ];

            const request = {
                origin: { lat: 35.9430, lng: 136.1888 },      // 出発地: 鯖江駅
                destination: { lat: 35.9519, lng: 136.1856 }, // 目的地: 西山公園駅（正しい座標）
                waypoints: waypoints,
                optimizeWaypoints: true,
                travelMode: google.maps.TravelMode.DRIVING     // WALKING や BICYCLE に変更可能
            };

            directionsService.route(request, function(result, status) {
                if (status === google.maps.DirectionsStatus.OK) {
                    directionsRenderer.setDirections(result);
                }
            });
        }
    </script>
</body>
</html>
