    <style>
        html, body {
            height: 100%;
            margin: 0;

        #map {

        .leaflet-popup-content {

            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
        }).addTo(map);

        // --- ランドマークの設定 ---
        const sabaeStation = [35.9427, 136.1870];      // 鯖江駅
        const nishiyamaParkStation = [35.9482, 136.1682]; // 目的地：西山公園駅（西山公園前）

        // 鯖江駅のマーカー
        L.marker(sabaeStation).addTo(map)
            .bindPopup('<b>スタート: 鯖江駅</b>').openPopup();

        // 西山公園前のマーカー
        L.marker(nishiyamaParkStation).addTo(map)
            .bindPopup('<b>目的地: 西山公園前（西山公園駅）</b>');

            [35.945889, 136.180028], // 14
            [35.946667, 136.180500], // 15
            [35.947583, 136.181111]  // 16
        ];

        // 事故現場を赤い丸でプロット
        accidentCoords.forEach((coord, index) => {
            L.circleMarker(coord, {
                radius: 7,
                fillColor: "#ff3333",
                color: "#fff",
                weight: 1.5,
                opacity: 1,
                fillOpacity: 0.8
            }).addTo(map).bindPopup(`⚠️ 事故現場地点 ${index + 1}`);
        });
