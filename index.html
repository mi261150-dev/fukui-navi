<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Sabae Bypass Route</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.css" />
    <style>
        #map { height: 100vh; width: 100%; }
        body { margin: 0; padding: 0; }
    </style>
</head>
<body>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.js"></script>

    <script>
        // 1. マップの初期化（鯖江駅周辺）
        const map = L.map('map').setView([35.9430, 136.1888], 15);

        // 2. 地図タイルの読み込み（OpenStreetMap）
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);

        // 3. 事故現場の座標（マーカー表示用）
        const accidentCoords = [35.9435, 136.1853];
        L.marker(accidentCoords, {
            icon: L.divIcon({
                className: 'custom-div-icon',
                html: "<div style='background-color:red;color:white;padding:5px;border-radius:5px;font-weight:bold;font-size:12px;white-space:nowrap;'>⚠️ 事故通行止</div>",
                iconSize: [30, 42],
                iconAnchor: [15, 42]
            })
        }).addTo(map);

        // 4. 事故現場を回避する北側迂回ルートの描画
        // [緯度, 経度] の順
        L.Routing.control({
            waypoints: [
                L.latLng(35.9430, 136.1888), // 出発地: 鯖江駅
                L.latLng(35.9472, 136.1920), // 経由地1: 北上した交差点
                L.latLng(35.9535, 136.1885), // 経由地2: 事故北側の安全な大通り
                L.latLng(35.9519, 136.1856)  // 目的地: 西山公園駅（正しい位置）
            ],
            routeWhileDragging: false,
            draggableWaypoints: false,
            addWaypoints: false,
            lineOptions: {
                styles: [{ color: 'blue', opacity: 0.7, weight: 6 }]
            }
        }).addTo(map);
    </script>
</body>
</html>
