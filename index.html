<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>鯖江駅〜西山公園前 マップ</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    <style>
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
        }
        #map {
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script>
        // 1. 地図の初期化（初期位置は鯖江駅付近）
        const map = L.map('map').setView([35.943, 136.184], 15);

        // 2. OpenStreetMapのタイルを追加
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap contributors'
        }).addTo(map);

        // --- 正確に計算し直した座標データ ---
        const sabaeStation = [35.94318, 136.18844];       // 鯖江駅
        const nishiyamaParkStation = [35.9482, 136.1682]; // 西山公園前

        // 事故現場の座標（度分秒から十進法へ正確に変換）
        const accidentCoords = [
            [35.943611, 136.188500], // 35°56'37.0"N 136°11'18.6"E
            [35.943444, 136.188417], // 35°56'36.4"N 136°11'18.3"E
            [35.942972, 136.188472], // 35°56'34.7"N 136°11'18.5"E
            [35.943389, 136.188056], // 35°56'36.2"N 136°11'17.0"E
            [35.943556, 136.185917], // 35°56'36.8"N 136°11'09.3"E
            [35.943722, 136.185028], // 35°56'37.4"N 136°11'06.1"E
            [35.943861, 136.182639], // 35°56'37.9"N 136°10'57.5"E
            [35.944472, 136.180250], // 35°56'40.1"N 136°10'48.9"E
            [35.943917, 136.180250], // 35°56'38.1"N 136°10'48.9"E
            [35.943778, 136.179778], // 35°56'37.7"N 136°10'47.2"E
            [35.943833, 136.178639], // 35°56'37.8"N 136°10'43.1"E
            [35.945361, 136.179694], // 35°56'43.3"N 136°10'46.9"E
            [35.945583, 136.179833], // 35°56'44.1"N 136°10'47.4"E
            [35.945889, 136.180028], // 35°56'45.2"N 136°10'48.1"E
            [35.946667, 136.180500], // 35°56'48.0"N 136°10'49.8"E
            [35.947583, 136.181111]  // 35°56'51.3"N 136°10'52.0"E
        ];

        // 3. スタートとゴールのピンを設置
        L.marker(sabaeStation).addTo(map).bindPopup('<b>スタート: 鯖江駅</b>').openPopup();
        L.marker(nishiyamaParkStation).addTo(map).bindPopup('<b>目的地: 西山公園前</b>');

        // 4. 事故現場を赤い丸でプロット
        accidentCoords.forEach((coord, index) => {
            L.circleMarker(coord, {
                radius: 7,
                fillColor: "#ff3333",
                color: "#fff",
                weight: 1.5,
                opacity: 1,
                fillOpacity: 0.8
            }).addTo(map).bindPopup(`⚠️ 事故現場地点 ${
