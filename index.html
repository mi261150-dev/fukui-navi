<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>鯖江駅〜道の駅 西山公園 安全ルートマップ</title>
    <link href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet" />
    <style>
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
        }
        #map {
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>

    <div id="map"></div>

    <script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>
    <script>
        // 座標定義（[経度, 緯度] の順になります ※Leafletと逆なので注意）
        const sabaeStation = [136.18844, 35.94318];        // 鯖江駅
        const michinoEkiNishiyama = [136.1687, 35.9493]; // 道の駅 西山公園

        // 事故現場の座標リスト [経度, 緯度]
        const accidentCoords = [
            [136.188500, 35.943611], [136.188417, 35.943444], [136.188472, 35.942972], 
            [136.188056, 35.943389], [136.185917, 35.943556], [136.185028, 35.943722], 
            [136.182639, 35.943861], [136.180250, 35.944472], [136.180250, 35.943917], 
            [136.179778, 35.943806], [136.178639, 35.943833], [136.179694, 35.945361], 
            [136.179833, 35.945583], [136.170028, 35.945889], [136.180500, 35.946667], 
            [136.181111, 35.947583]
        ];

        // 事故現場を避ける安全な大通りルート
        const safeRoutePoints = [
            sabaeStation,
            [136.1883, 35.9425], 
            [136.1881, 35.9416], 
            [136.1809, 35.9419], 
            [136.1751, 35.9422], 
            [136.1753, 35.9437], 
            [136.1756, 35.9466], 
            [136.1758, 35.9482], 
            [136.1758, 35.9488], 
            [136.1717, 35.9484], 
            michinoEkiNishiyama
        ];

        // 地図の初期化
        const map = new maplibregl.Map({
            container: 'map',
            style: 'https://tiles.openfreemap.org/styles/liberty', // 無料のマップスタイル
            center: [136.175, 35.945],
            zoom: 14
        });

        map.on('load', () => {
            // 1. ルート線を地図に追加
            map.addSource('route', {
                'type': 'geojson',
                'data': {
                    'type': 'Feature',
                    'geometry': {
                        'type': 'LineString',
                        'coordinates': safeRoutePoints
                    }
                }
            });
            map.addLayer({
                'id': 'route-layer',
                'type': 'line',
                'source': 'route',
                'layout': { 'line-join': 'round', 'line-cap': 'round' },
                'paint': { 'line-color': '#0066ff', 'line-width': 6, 'line-opacity': 0.8 }
            });

            // 2. 事故現場を赤い丸で追加
            accidentCoords.forEach((coord, index) => {
                map.addSource(`accident-${index}`, {
                    'type': 'geojson',
                    'data': {
                        'type': 'Feature',
                        'geometry': { 'type': 'Point', 'coordinates': coord }
                    }
                });
                map.addLayer({
                    'id': `accident-layer-${index}`,
                    'type': 'circle',
                    'source': `accident-${index}`,
                    'paint': {
                        'circle-radius': 7,
                        'circle-color': '#ff3333',
                        'circle-stroke-width': 1.5,
                        'circle-stroke-color': '#ffffff'
                    }
                });
            });

            // 3. スタートとゴールのマーカーを設置
            new maplibregl.Marker({ color: '#3388ff' }).setLngLat(sabaeStation).setPopup(new maplibregl.Popup().setHTML('<b>スタート: 鯖江駅</b>')).addTo(map);
            new maplibregl.Marker({ color: '#ff8800' }).setLngLat(michinoEkiNishiyama).setPopup(new maplibregl.Popup().setHTML('<b>目的地: 道の駅 西山公園</b>')).addTo(map);

            // 4. 全地点が収まる画角に自動調整
            const bounds = new maplibregl.LngLatBounds();
            bounds.extend(sabaeStation);
            bounds.extend(michinoEkiNishiyama);
            accidentCoords.forEach(coord => bounds.extend(coord));
            map.fitBounds(bounds, { padding: 40 });
        });
    </script>
</body>
</html>
