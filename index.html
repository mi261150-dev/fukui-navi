<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Sabae Route</title>
    <style>
        #map { height: 100vh; width: 100%; }
        body { margin: 0; }
    </style>
    <script src="https://maps.googleapis.com/maps/api/js?key=YOUR_API_KEY&callback=initMap" async defer></script>
</head>
<body>
    <div id="map"></div>
    <script>
        function initMap() {
            const map = new google.maps.Map(document.getElementById('map'), {
                zoom: 15,
                center: { lat: 35.9433, lng: 136.1884 }
            });

            const directionsService = new google.maps.DirectionsService();
            const directionsRenderer = new google.maps.DirectionsRenderer({ map: map });

            // 事故を回避するための南側迂回経由地
            const waypoints = [
                { location: new google.maps.LatLng(35.9388, 136.1855), stopover: false },
                { location: new google.maps.LatLng(35.9392, 136.1742), stopover: false }
            ];

            const request = {
                origin: { lat: 35.9433, lng: 136.1884 }, // 鯖江駅
                destination: { lat: 35.9451, lng: 136.1706 }, // 西山公園駅
                waypoints: waypoints,
                optimizeWaypoints: true,
                travelMode: google.maps.TravelMode.DRIVING // WALKING または BICYCLE に変更可
            };

            directionsService.route(request, function(result, status) {
                if (status === google.maps.DirectionsStatus.OK) {
                    directionsRenderer.setDirections(result);
                }
            });
        }
    </script>
</body>
</html>
